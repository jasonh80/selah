  - id: IQ-005
    area: workers
    improvement: >-
      generate-images-background writes durable audit rows for PRE-AUTH
      refusals (non-POST, missing fields, bad token) on a publicly reachable
      function URL — an unauthenticated caller can flood the audit table and
      bury genuine refusal entries. Mirror the redo worker's fix (PR #51):
      console-only before signature verification, durable audit after.
    evidence: >-
      Codex exact-head review of PR #51 (2026-07-18) confirmed the pattern;
      the redo worker was fixed there, the pre-existing images worker was
      left untouched (frozen path).
    priority_trigger: next Studio-safety pass (small bounded fix; free; no
      behavior change for authenticated flows)
    status: finished
    completion_pr: "direct commit ad6964c (2026-07-18) - console-only
      pre-auth refusals in BOTH public image workers; queue entry reconciled
      2026-07-19"

  - id: IQ-006
    area: workers
    improvement: >-
      generateAndStoreChapterImages (full-run path) counts an in-flight
      model request as possible spend only on DEADLINE errors — a normal
      connection loss or 5xx after dispatch can record "no spend" and
      release the claim even though the provider may have billed the
      request. Apply PR #51's fix: any post-dispatch failure is possible
      spend (max(generated, started)), recorded durably with
      billingUncertain, claim locked rather than silently released.
    evidence: >-
      Codex exact-head review of PR #51 (2026-07-18) found the class on the
      redo path; the same accounting exists in the frozen full-run worker
      (lib/server/images.ts spend envelope).
    priority_trigger: before the next paid full image run (protects real
      money; owner-gated path, so fix + gate first)
    status: finished
    completion_pr: "direct commit ad6964c (2026-07-18) - any post-dispatch
      failure records possible spend (max(generated, started), billingUncertain,
      blocked on unrecordable cost); queue entry reconciled 2026-07-19"

  - id: IQ-007
    area: navigation
    improvement: >-
      Retire the prescribed-daily-chapter framing. Remove the visible
      "Today" button/concept from navigation; Selah becomes a
      choose-what-you-study experience. Every chapter lives on its
      canonical shareable URL (/chapter/mark-9 etc.) and chapter selection,
      Continue Reading, next/previous, notifications, bookmarks, and share
      actions all land there. If /today is retained for compatibility it
      becomes a quiet temporary redirect to the selected/latest chapter's
      canonical URL — the browser must END on /chapter/{slug}, never render
      duplicate chapter content on a second URL. Canonical metadata and
      share actions always use /chapter/{book}-{chapter}. Visible nav:
      Chapters now; Continue Reading later once reading history exists.
    evidence: >-
      Owner direction, board #29 (2026-07-18, two comments — "Remove the
      visible Today button" + "Final owner direction — chapter URLs and
      Today").
    priority_trigger: next navigation/layout pass — explicitly sequenced
      AFTER launch-critical safety work (IQ-005/IQ-006); do not code ahead
      of it
    status: queued
    completion_pr: null

