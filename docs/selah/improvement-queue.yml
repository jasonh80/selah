  - id: IQ-020
    area: content-schema
    improvement: >-
      "Gospel Comparison" section: how THIS chapter's telling differs
      across Matthew/Mark/Luke/John — e.g. Mark 11's two-day temple telling
      and leafy branches vs. Matthew's same-day + Zechariah, Luke's
      cloaks-only + weeping, John's palms. Rides the existing honesty
      model: each difference labeled by which Gospel says what, never
      blended. OWNER SPINE (2026-07-20): Selah Brain/voice commentary on
      the similarities AND differences and possible reasons why — "always
      pointing to even greater evidence of the truth of the Gospels."
      HONESTY BOUND (Codex review): similarities and differences can fit
      the texture of real testimony and purposeful Gospel writing, but
      Selah never claims independence or eyewitness vantage where the
      evidence does not establish it. Possible reasons include authorial
      purpose, audience, arrangement, and source selection; eyewitness
      perspective is offered only where warranted and clearly labeled as
      evidence or inference. Agreement on the core strengthens confidence
      without turning every variation into proof. Needs a spec:
      schema, renderer, prompt/gate coverage, per-genre applicability
      (Gospels only), backfill decision.
    evidence: >-
      Owner idea, in-session 2026-07-20, mid Mark 11 launch, sparked by the
      cross-Gospel guardrail ("OOOHHHH!!!! that should be another section
      !!!! gospel comparison").
    priority_trigger: owner-initiated design pass; Codex spec first (pairs
      naturally with the Kelly-characters spec session); build after the
      Mark 6-10 polish batch
    status: queued
    completion_pr: null

