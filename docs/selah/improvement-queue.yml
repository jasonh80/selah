# Selah shared improvement queue (board #29 owner decision, 2026-07-17).
#
# The single place both AIs record improvement candidates. Rules:
# - "catch up" = both AIs read this file; nightly homework checks it.
# - Before any chapter refresh, review that chapter's queued notes.
# - Completed work updates the entry and links its PR. Jason does no
#   recordkeeping here.
# - status is a CLOSED enum: queued | working | finished | declined —
#   nothing else, so catch-up and nightly homework can filter
#   deterministically.
# - priority/trigger says WHEN the item should be picked up, not how
#   important it feels.
# - Lean by design: no framework, no Studio display or gate, no live-data
#   coupling. This file is version control only.

entries:
  - id: IQ-001
    area: mark-9-wording
    improvement: >-
      In the suffering-boy movement, show how the plural "help us" (Mark 9:22
      says "us" explicitly) includes the father in the burden — he carries the
      boy's suffering as his own. The wider whole-family implication is a
      strong, reasonable INFERENCE and must be labeled as such, not stated as
      fact. Current copy reads the plea as primarily the father's faith
      moment.
    evidence: >-
      Codex non-blocking launch note, board #29 (2026-07-17), from the full
      published-chapter review; echoed in the Mark 9 refresh notes.
    priority_trigger: next Mark 9 content refresh (rollback-safe regeneration
      only — never in-place mutation)
    status: queued
    completion_pr: null

  - id: IQ-002
    area: mark-9-wording
