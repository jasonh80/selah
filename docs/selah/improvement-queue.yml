# Selah shared improvement queue (board #29 owner decision, 2026-07-17).
#
# The single place both AIs record improvement candidates. Rules:
# - "catch up" = both AIs read this file; nightly homework checks it.
# - Before any chapter refresh, review that chapter's queued notes.
# - Completed work updates the entry and links its PR. Jason does no
#   recordkeeping here.
# - status is a CLOSED enum: queued | working | finished | declined —
#   nothing else, so catch-up and nightly homework can filter
#   deterministically.
# - priority/trigger says WHEN the item should be picked up, not how
#   important it feels.
# - Lean by design: no framework, no Studio display or gate, no live-data
#   coupling. This file is version control only.

