  - id: IQ-009
    area: runtime-health
    improvement: >-
      Chapter pages log React hydration errors in the browser console
      (minified #418, #423, #425 — server/client content mismatch) on
      initial load. No visible breakage observed, but hydration mismatches
      can silently drop event handlers and mask real regressions. Find the
      mismatching render (suspects: date/time-dependent output rendered at
      request time) and make server and client output identical.
    evidence: >-
      Claude live check of production r100/r101 (2026-07-18) during the
      maps visual verification; errors present on mark-7/8/9 chapter loads
      before any map interaction.
    priority_trigger: next runtime/layout pass (free; diagnose first —
      the fix must not touch chapter content)
    status: finished
    completion_pr: "#57 hydration-safe ThemeProvider (merged 2026-07-18);
      Claude live-check 2026-07-19: no console errors on published chapter loads"

  - id: IQ-010
    area: images
    improvement: >-
      OWNER DECISION (binding): never delete generated images, and keep
      retained ones findable — any future cleanup tooling must be
      owner-gated and default to keep. Storage already honors the first
      half by design (unique per-job directories, upsert:false, zero
      deletion code) — replaced images, rejected redo candidates, and
      superseded runs all stay at their URLs. PROPOSED IMPLEMENTATION
      (Claude's suggestion, open to redesign): a lightweight owner-facing
      image library cataloging every stored image (e.g. chapter, kind,
      job, date, status such as in-use / replaced / rejected-candidate /
      orphaned-run) so old images can be browsed and reused instead of
      being reachable only through audit rows.
    evidence: >-
      Owner direction (Jason, 2026-07-18, in-session): "do not get rid of
      old images, find a smart way to keep them stored when they are not
      used or discarded." Claude verified the append-only storage claims
      against lib/server/images.ts the same day.
    priority_trigger: after the current safety work (IQ-005/IQ-006) and
      Mark 10; pairs naturally with the People/gallery direction. Owner
      interest re-voiced 2026-07-20 mid-launch ("it will be interesting
      one day to look at the outtakes folder of images unused") — the day
      produced two rejected Humble King candidates, both preserved
    status: queued
    completion_pr: null

  - id: IQ-011
    area: studio-launch
    improvement: >-
      OWNER DECISION (binding): Prepare becomes a built-in step of the
      launch page — the same self-serve workflow supports ANY chapter (not
      every genre forced into identical modules): pick a chapter, Studio
      generates a CHAPTER-APPROPRIATE proposed spec on-screen (movement
      boundaries and names, guardrails, guidance notes, honest location
      entries only when genuinely useful), the owner reviews and
      digest-binds his approval, and launch proceeds. No coding session, no
      PR, no pre-arranged AI work per chapter. FAIL-CLOSED: if Studio
      cannot create and validate a safe spec, it stops with a clear reason
      — it never fills gaps silently and never bypasses Jason. Audit line
      in plain language: Jason remains the required reviewer before any
      paid generation or publication; Codex may review completed launches
      afterward for learning, cannot change live content automatically,
      and is not a pre-launch gate — simplify the process. All existing
      safety stays: digest-bound approval, explicit paid-run confirms,
      spend accounting, honest-map model, fail-closed gates. PROPOSED
      SHAPE (open to Codex design input): the spec generation is itself a
      bounded preparation step — when AI is used, Studio shows the exact
      maximum cost and requires one explicit confirmation, one request, no
      automatic retry — with the same two-axis location honesty and closed
      movement-range validation the code fixtures enforce today; specs the
      flow produces are stored digest-bound like current approvals, never
      silently editable.
    evidence: >-
      Owner direction (Jason, 2026-07-18, in-session), after Mark 10
      needed PR #54 to become launchable: "preload needs to be a step on
      the launch page … for every chapter … I don't want to have to tell
      you every time." Decision confirmed same session: Codex reviews
      after; simplify the process.
    priority_trigger: next Studio feature lane, after Mark 10's supervised
      launch validates the current flow end to end; design note from Codex
      first, then one focused build PR
    status: finished
    completion_pr: "#58 self-serve Prepare (merged 2026-07-19; owner ran the
      SQL same day) - first live walkthrough still pending with Jason"

