  - id: IQ-003
    area: layout
    improvement: >-
      Fix the true-320px overflow: the flex-nowrap Quick/Deep control row
      overflows an 11px sliver (the Deep Dive button ends ~330.6px against a
      320px content viewport). Allow that row to wrap or give it a
      narrow-width treatment, then add a 320px regression check. Do NOT touch
